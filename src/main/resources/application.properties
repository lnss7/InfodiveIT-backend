spring.application.name=infodive-api
# application.properties — Infodive API
# Copie este arquivo para src/main/resources/application.properties
# e preencha as variáveis de ambiente

# ─────────────────────────────────────────
# Servidor
# ─────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api/v1

# ─────────────────────────────────────────
# Banco de Dados — Neon PostgreSQL
# ─────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://ep-delicate-bread-actvkpjw.sa-east-1.aws.neon.tech/neondb?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ─────────────────────────────────────────
# JPA / Hibernate
# ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Inicialização SQL (data.sql) — seed de desenvolvimento.
# defer = roda DEPOIS do Hibernate criar as tabelas. mode=always executa o data.sql no startup.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ─────────────────────────────────────────
# Jackson (JSON)
# ─────────────────────────────────────────
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo

# ─────────────────────────────────────────
# Segurança
# ─────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# CORS — origens permitidas
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}

# ─────────────────────────────────────────
# Logs
# ─────────────────────────────────────────
logging.level.br.com.infodive=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
