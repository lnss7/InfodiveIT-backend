spring.application.name=infodive-api
# application.properties — Infodive API
# Copie este arquivo para src/main/resources/application.properties
# e preencha as variáveis de ambiente

# ─────────────────────────────────────────
# Servidor
# ─────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api/v1

# ─────────────────────────────────────────
# Banco de Dados — Supabase PostgreSQL
# ─────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ─────────────────────────────────────────
# Supabase Storage
# ─────────────────────────────────────────
supabase.url=${SUPABASE_URL:}
supabase.key=${SUPABASE_SERVICE_ROLE_KEY:}
supabase.bucket=${SUPABASE_STORAGE_BUCKET:images}

# ─────────────────────────────────────────
# JPA / Hibernate
# ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Inicialização SQL (data.sql) — desativada permanentemente.
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# ─────────────────────────────────────────
# Jackson (JSON)
# ─────────────────────────────────────────
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo

# ─────────────────────────────────────────
# Segurança
# ─────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.mock-entra-id=${MOCK_ENTRA_ID:true}

# CORS — origens permitidas
cors.allowed-origins=${ALLOWED_ORIGINS:*,http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:3004}

# ─────────────────────────────────────────
# Logs
# ─────────────────────────────────────────
logging.level.br.com.infodive=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
